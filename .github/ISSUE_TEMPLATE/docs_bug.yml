name: Docs bug
description: Something in the docs is wrong, outdated, or misleading.
title: "[docs-bug] "
labels: ["docs", "bug"]
body:
  - type: markdown
    attributes:
      value: |
        For typos or wrong content. If the docs are missing something, file a "Docs improvement" instead.

  - type: input
    id: which-doc
    attributes:
      label: Which doc
      description: File path in this repo (e.g. setup.md) or full URL.
      placeholder: setup.md or https://github.com/ameyypawar/gfix-docs/blob/main/setup.md#install
    validations:
      required: true

  - type: textarea
    id: whats-wrong
    attributes:
      label: What's wrong
      description: Quote the wrong text or describe the mistake. Include a screenshot if it's a rendering issue.
    validations:
      required: true

  - type: textarea
    id: what-it-should-say
    attributes:
      label: What it should say
      description: Optional. A proposed fix or correction.
    validations:
      required: false

  - type: input
    id: gfix-version
    attributes:
      label: gfix version you're using
      description: Optional. Helps if the doc is out of sync with a specific release.
      placeholder: gfix 0.3.1
    validations:
      required: false
